<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PokéPharm</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      font-family: Arial, sans-serif;
      background: #071622;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;

      background:
        repeating-linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.012) 0px,
          rgba(255, 255, 255, 0.012) 1px,
          transparent 1px,
          transparent 7px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(0, 0, 0, 0.018) 0px,
          rgba(0, 0, 0, 0.018) 1px,
          transparent 1px,
          transparent 8px
        );

      opacity: 0.25;
      mix-blend-mode: soft-light;
    }

    .page {
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .container {
      width: min(88vw, calc(88svh * 1065 / 1477), 420px);
      aspect-ratio: 1065 / 1477;
      position: relative;
      cursor: pointer;
      perspective: 1000px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .physical-card {
      --tilt-x: 0deg;
      --tilt-y: 0deg;
      --flip-y: 0deg;
      --scale: 1;

      position: absolute;
      inset: 0;
      border-radius: 22px;
      transform-style: preserve-3d;

      transform:
        rotateX(var(--tilt-x))
        rotateY(calc(var(--flip-y) + var(--tilt-y)))
        scale(var(--scale));

      transition: transform 0.12s ease;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    .container.is-flipped .physical-card {
      --flip-y: 180deg;
    }

    .container.is-animating .physical-card {
      transition: transform 0.75s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      overflow: hidden;

      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-front {
      background-image: url("./PokePharm.webp");
      background-size: cover;
      background-position: center;
      transform: translateZ(1px);
    }

    .card-back {
      transform: rotateY(180deg) translateZ(1px);
      background: linear-gradient(
        145deg,
        #a13c41 0%,
        #8f3238 55%,
        #7e2b32 100%
      );
      display: flex;
      justify-content: center;
      align-items: center;
      isolation: isolate;
    }

    .card-back::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      pointer-events: none;
      z-index: 5;

      background:
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.045),
          transparent 42%,
          rgba(0, 0, 0, 0.055)
        );

      box-shadow:
        inset 0 0 24px rgba(255, 255, 255, 0.035),
        inset 0 0 42px rgba(0, 0, 0, 0.12);
    }

    .back-cavity {
      position: absolute;
      inset: 24px 22px;
      border-radius: 16px;
      overflow: hidden;
      z-index: 2;

      background:
        linear-gradient(145deg, #6f2029 0%, #541721 58%, #421019 100%);

      box-shadow:
        inset 0 20px 34px rgba(0, 0, 0, 0.38),
        inset 0 -10px 22px rgba(255, 255, 255, 0.035),
        inset 6px 0 14px rgba(0, 0, 0, 0.12),
        inset -6px 0 14px rgba(255, 255, 255, 0.02);
    }

    .back-cavity::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      border-radius: 16px;

      background:
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.055),
          rgba(255, 255, 255, 0.01) 35%,
          rgba(0, 0, 0, 0.16)
        ),
        rgba(120, 35, 42, 0.28);

      box-shadow:
        inset 0 0 28px rgba(255, 255, 255, 0.025),
        inset 0 0 62px rgba(0, 0, 0, 0.25);
    }

    .back-cavity::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 12px;
      z-index: 4;
      pointer-events: none;

      border: 1px solid rgba(255, 255, 255, 0.035);
      box-shadow:
        inset 0 0 16px rgba(0, 0, 0, 0.24);
    }

    .back-depth {
      --depth-x: 0px;
      --depth-y: 0px;

      position: absolute;
      inset: 0;
      z-index: 2;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      transform: translate(var(--depth-x), var(--depth-y));
      transition: transform 0.12s ease;
      pointer-events: auto;

      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .back-logo {
      position: absolute;
      top: 34px;
      left: 0;
      width: 100%;
      text-align: center;

      color: white;
      font-size: clamp(1.35rem, 3.5vw, 2.05rem);
      font-weight: 400;
      letter-spacing: 0.05em;

      text-shadow:
        0 2px 3px rgba(0, 0, 0, 0.42);
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .contact-list a {
      color: white;
      text-decoration: none;
      font-size: clamp(1.2rem, 3.8vw, 1.9rem);
      font-weight: 400;
      letter-spacing: 0.06em;

      text-shadow:
        0 2px 3px rgba(0, 0, 0, 0.42);
    }

    .contact-list a:hover {
      text-decoration: underline;
    }

    .shine {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      border-radius: 22px;

      background: linear-gradient(
        105deg,
        transparent 35%,
        rgba(255, 219, 112, 0.7) 45%,
        rgba(132, 50, 255, 0.58) 50%,
        rgba(96, 220, 255, 0.5) 55%,
        transparent 65%
      );

      background-size: 200% 200%;
      mix-blend-mode: color-dodge;
      filter: brightness(1.2) saturate(1.4);
      transition: opacity 0.2s ease;
    }

    .cursor-light {
      --x: 50%;
      --y: 50%;

      position: absolute;
      inset: 0;
      z-index: 6;
      pointer-events: none;
      opacity: 0;
      border-radius: 22px;

      background: radial-gradient(
        circle at var(--x) var(--y),
        rgba(255, 255, 255, 0.35) 0%,
        rgba(140, 210, 255, 0.18) 18%,
        transparent 38%
      );

      mix-blend-mode: screen;
      transition: opacity 0.2s ease;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="container">
      <div class="physical-card">
        <div class="card-face card-front">
          <div class="shine"></div>
          <div class="cursor-light"></div>
        </div>

        <div class="card-face card-back">
          <div class="back-cavity">
            <div class="back-depth">
              <div class="back-logo">Join PokéPharm!</div>

              <div class="contact-list">
                <a href="#">Instagram</a>
                <a href="#">Contact</a>
              </div>
            </div>
          </div>

          <div class="cursor-light"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const container = document.querySelector(".container");
    const physicalCard = document.querySelector(".physical-card");
    const shine = document.querySelector(".shine");
    const cursorLights = document.querySelectorAll(".cursor-light");
    const backDepth = document.querySelector(".back-depth");

    let isHovering = false;

    container.addEventListener("pointermove", function (e) {
      isHovering = true;

      const rect = container.getBoundingClientRect();

      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const percentX = x / rect.width;
      const percentY = y / rect.height;

      const rotateY = 15 - percentX * 30;
      const rotateX = percentY * 30 - 15;

      physicalCard.style.setProperty("--tilt-x", `${rotateX}deg`);
      physicalCard.style.setProperty("--tilt-y", `${rotateY}deg`);
      physicalCard.style.setProperty("--scale", "1.03");

      const depthX = Math.round(-rotateY * 0.26);
      const depthY = Math.round(rotateX * 0.26);

      backDepth.style.setProperty("--depth-x", `${depthX}px`);
      backDepth.style.setProperty("--depth-y", `${depthY}px`);

      cursorLights.forEach((light) => {
        light.style.setProperty("--x", `${percentX * 100}%`);
        light.style.setProperty("--y", `${percentY * 100}%`);
        light.style.opacity = "0.55";
      });

      if (!container.classList.contains("is-flipped")) {
        shine.style.opacity = "0.85";
        shine.style.backgroundPosition = `${percentX * 100}% ${percentY * 100}%`;
      } else {
        shine.style.opacity = "0";
      }
    });

    container.addEventListener("pointerleave", function () {
      isHovering = false;

      physicalCard.style.setProperty("--tilt-x", "0deg");
      physicalCard.style.setProperty("--tilt-y", "0deg");
      physicalCard.style.setProperty("--scale", "1");

      backDepth.style.setProperty("--depth-x", "0px");
      backDepth.style.setProperty("--depth-y", "0px");

      shine.style.opacity = "0";

      cursorLights.forEach((light) => {
        light.style.opacity = "0";
      });
    });

    container.addEventListener("click", function (e) {
      if (e.target.closest("a")) return;

      container.classList.add("is-animating");
      container.classList.toggle("is-flipped");

      shine.style.opacity = "0";

      cursorLights.forEach((light) => {
        light.style.opacity = "0";
      });

      setTimeout(() => {
        container.classList.remove("is-animating");
      }, 750);
    });

    document.addEventListener(
      "touchmove",
      function (e) {
        e.preventDefault();
      },
      { passive: false }
    );
  </script>
</body>
</html>
