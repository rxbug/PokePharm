<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PokéPharm</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      font-family: Arial, sans-serif;
      background: #071622;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;

      background:
        repeating-linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.012) 0px,
          rgba(255, 255, 255, 0.012) 1px,
          transparent 1px,
          transparent 7px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(0, 0, 0, 0.018) 0px,
          rgba(0, 0, 0, 0.018) 1px,
          transparent 1px,
          transparent 8px
        );

      opacity: 0.25;
      mix-blend-mode: soft-light;
    }

    .page {
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .container {
      width: min(88vw, calc(88svh * 1065 / 1477), 420px);
      aspect-ratio: 1065 / 1477;
      position: relative;
      cursor: pointer;
      perspective: 1000px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .physical-card {
      --tilt-x: 0deg;
      --tilt-y: 0deg;
      --flip-y: 0deg;
      --scale: 1;

      position: absolute;
      inset: 0;
      border-radius: 22px;
      transform-style: preserve-3d;

      transform:
        rotateX(var(--tilt-x))
        rotateY(calc(var(--flip-y) + var(--tilt-y)))
        scale(var(--scale));

      transition: transform 0.12s ease;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    .container.is-flipped .physical-card {
      --flip-y: 180deg;
    }

    .container.is-animating .physical-card {
      transition: transform 0.75s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      overflow: hidden;

      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-front {
      background-image: url("./PokePharm.webp");
      background-size: cover;
      background-position: center;
      transform: translateZ(1px);
    }

    .card-back {
      transform: rotateY(180deg) translateZ(1px);
      background: linear-gradient(145deg, #9f3b3f 0%, #7d2c32 52%, #68242b 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      isolation: isolate;
    }

    .card-back::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      pointer-events: none;
      z-index: 5;

      background:
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.04),
          transparent 45%,
          rgba(0, 0, 0, 0.04)
        );

      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.025),
        inset 0 0 28px rgba(0, 0, 0, 0.06);
    }

    .back-cavity {
      --texture-x: 0px;
      --texture-y: 0px;

      position: absolute;
      inset: 20px 18px;
      border-radius: 15px;
      overflow: hidden;
      z-index: 2;

      clip-path: inset(0 round 15px);
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      transform: translateZ(0);

      background:
        radial-gradient(
          ellipse at center,
          #84333a 0%,
          #7a2f37 44%,
          #6d2932 72%,
          #5f232c 100%
        );

      box-shadow:
        inset 0 14px 22px rgba(66, 18, 27, 0.26),
        inset 0 -10px 18px rgba(255, 255, 255, 0.035),
        inset 0 0 20px rgba(64, 18, 26, 0.18);
    }

    .cavity-texture {
      position: absolute;
      inset: -24px;
      pointer-events: none;
      z-index: 1;

      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 220 220' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.72' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='matrix' values='1.2 0 0 0 0  0 0.7 0 0 0  0 0 0.7 0 0  0 0 0 1 0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.55'/%3E%3C/svg%3E");

      background-size: 90px 90px;
      opacity: 0.75;
      mix-blend-mode: soft-light;

      transform: translate(var(--texture-x), var(--texture-y));
      transition: transform 0.12s ease;
    }

    .back-cavity::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 2;

      background:
        radial-gradient(
          ellipse at center,
          rgba(255, 255, 255, 0.035) 0%,
          transparent 55%,
          rgba(64, 18, 26, 0.16) 100%
        );
    }

    .back-text-layer {
      position: absolute;
      inset: 20px 18px;
      z-index: 6;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      pointer-events: auto;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .back-logo {
      position: absolute;
      top: 34px;
      left: 0;
      width: 100%;
      text-align: center;

      color: white;
      font-size: clamp(1.35rem, 3.5vw, 2.05rem);
      font-weight: 400;
      letter-spacing: 0.05em;

      text-shadow:
        0 2px 3px rgba(0, 0, 0, 0.34);
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .contact-list a {
      color: white;
      text-decoration: none;
      font-size: clamp(1.2rem, 3.8vw, 1.9rem);
      font-weight: 400;
      letter-spacing: 0.06em;

      text-shadow:
        0 2px 3px rgba(0, 0, 0, 0.34);
    }

    .contact-list a:hover {
      text-decoration: underline;
    }

    .shine {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      border-radius: 22px;

      background: linear-gradient(
        105deg,
        transparent 35%,
        rgba(255, 219, 112, 0.7) 45%,
        rgba(132, 50, 255, 0.58) 50%,
        rgba(96, 220, 255, 0.5) 55%,
        transparent 65%
      );

      background-size: 200% 200%;
      mix-blend-mode: color-dodge;
      filter: brightness(1.2) saturate(1.4);
      transition: opacity 0.2s ease;
    }

    .cursor-light {
      --x: 50%;
      --y: 50%;

      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      opacity: 0;
      border-radius: 22px;

      background: radial-gradient(
        circle at var(--x) var(--y),
        rgba(255, 255, 255, 0.35) 0%,
        rgba(140, 210, 255, 0.18) 18%,
        transparent 38%
      );

      mix-blend-mode: screen;
      transition: opacity 0.2s ease;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="container">
      <div class="physical-card">
        <div class="card-face card-front">
          <div class="shine"></div>
          <div class="cursor-light"></div>
        </div>

        <div class="card-face card-back">
          <div class="back-cavity">
            <div class="cavity-texture"></div>
          </div>

          <div class="back-text-layer">
            <div class="back-logo">Join PokéPharm!</div>

            <div class="contact-list">
              <a href="#">Instagram</a>
              <a href="#">Contact</a>
            </div>
          </div>

          <div class="cursor-light"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const container = document.querySelector(".container");
    const physicalCard = document.querySelector(".physical-card");
    const shine = document.querySelector(".shine");
    const cursorLights = document.querySelectorAll(".cursor-light");
    const backCavity = document.querySelector(".back-cavity");

    let isHovering = false;

    container.addEventListener("pointermove", function (e) {
      isHovering = true;

      const rect = container.getBoundingClientRect();

      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const percentX = x / rect.width;
      const percentY = y / rect.height;

      const rotateY = 15 - percentX * 30;
      const rotateX = percentY * 30 - 15;

      physicalCard.style.setProperty("--tilt-x", `${rotateX}deg`);
      physicalCard.style.setProperty("--tilt-y", `${rotateY}deg`);
      physicalCard.style.setProperty("--scale", "1.03");

      const textureX = Math.round(-rotateY * 0.18);
      const textureY = Math.round(rotateX * 0.18);

      backCavity.style.setProperty("--texture-x", `${textureX}px`);
      backCavity.style.setProperty("--texture-y", `${textureY}px`);

      cursorLights.forEach((light) => {
        light.style.setProperty("--x", `${percentX * 100}%`);
        light.style.setProperty("--y", `${percentY * 100}%`);
        light.style.opacity = "0.55";
      });

      if (!container.classList.contains("is-flipped")) {
        shine.style.opacity = "0.85";
        shine.style.backgroundPosition = `${percentX * 100}% ${percentY * 100}%`;
      } else {
        shine.style.opacity = "0";
      }
    });

    container.addEventListener("pointerleave", function () {
      isHovering = false;

      physicalCard.style.setProperty("--tilt-x", "0deg");
      physicalCard.style.setProperty("--tilt-y", "0deg");
      physicalCard.style.setProperty("--scale", "1");

      backCavity.style.setProperty("--texture-x", "0px");
      backCavity.style.setProperty("--texture-y", "0px");

      shine.style.opacity = "0";

      cursorLights.forEach((light) => {
        light.style.opacity = "0";
      });
    });

    container.addEventListener("click", function (e) {
      if (e.target.closest("a")) return;

      container.classList.add("is-animating");
      container.classList.toggle("is-flipped");

      shine.style.opacity = "0";

      cursorLights.forEach((light) => {
        light.style.opacity = "0";
      });

      setTimeout(() => {
        container.classList.remove("is-animating");
      }, 750);
    });

    document.addEventListener(
      "touchmove",
      function (e) {
        e.preventDefault();
      },
      { passive: false }
    );
  </script>
</body>
</html>
