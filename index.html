<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PokéPharm</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      overscroll-behavior: none;
    }

    body {
      position: fixed;
      inset: 0;
      font-family: Arial, sans-serif;
      background: #071622;
      touch-action: none;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;

      background:
        repeating-linear-gradient(
          45deg,
          rgba(255, 255, 255, 0.012) 0px,
          rgba(255, 255, 255, 0.012) 1px,
          transparent 1px,
          transparent 7px
        ),
        repeating-linear-gradient(
          -45deg,
          rgba(0, 0, 0, 0.018) 0px,
          rgba(0, 0, 0, 0.018) 1px,
          transparent 1px,
          transparent 8px
        );

      opacity: 0.25;
      mix-blend-mode: soft-light;
    }

    .page {
      height: 100vh;
      height: 100svh;
      height: 100dvh;
      overflow: hidden;

      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .container {
      width: min(88vw, calc(88svh * 1065 / 1477), 420px);
      aspect-ratio: 1065 / 1477;
      position: relative;
      cursor: pointer;
      perspective: 1000px;
      touch-action: none;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    .physical-card {
      --tilt-x: 0deg;
      --tilt-y: 0deg;
      --flip-y: 0deg;
      --scale: 1;

      position: absolute;
      inset: 0;
      border-radius: 22px;
      transform-style: preserve-3d;

      transform:
        rotateX(var(--tilt-x))
        rotateY(calc(var(--flip-y) + var(--tilt-y)))
        scale(var(--scale));

      transition: transform 0.12s ease;
      box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    .container.is-flipped .physical-card {
      --flip-y: 180deg;
    }

    .container.is-animating .physical-card {
      transition: transform 0.75s cubic-bezier(0.2, 0.7, 0.2, 1);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 22px;
      overflow: hidden;

      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-front {
      background-image: url("./PokePharm.webp");
      background-size: cover;
      background-position: center;
      transform: translateZ(1px);
    }

    .card-back {
      transform: rotateY(180deg) translateZ(1px);
      background: linear-gradient(145deg, #9f3b3f 0%, #7d2c32 52%, #68242b 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      isolation: isolate;
    }

    .card-back::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 22px;
      pointer-events: none;
      z-index: 5;

      background:
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.04),
          transparent 45%,
          rgba(0, 0, 0, 0.04)
        );

      box-shadow:
        inset 0 0 18px rgba(255, 255, 255, 0.025),
        inset 0 0 28px rgba(0, 0, 0, 0.06);
    }

    .back-cavity {
      --texture-x: 0px;
      --texture-y: 0px;

      position: absolute;
      inset: 20px 18px;
      border-radius: 15px;
      overflow: hidden;
      z-index: 2;

      clip-path: inset(0 round 15px);
      -webkit-mask-image: -webkit-radial-gradient(white, black);
      transform: translateZ(0);

      background:
        radial-gradient(
          circle at 25% 22%,
          rgba(38, 92, 170, 0.18) 0%,
          transparent 34%
        ),
        radial-gradient(
          circle at 76% 70%,
          rgba(155, 35, 78, 0.14) 0%,
          transparent 36%
        ),
        radial-gradient(
          ellipse at center,
          #050814 0%,
          #02030a 48%,
          #000104 100%
        );

      box-shadow:
        inset 0 18px 30px rgba(0, 0, 0, 0.62),
        inset 0 -10px 22px rgba(90, 120, 180, 0.06),
        inset 0 0 34px rgba(0, 0, 0, 0.86);
    }

    .cavity-space {
      position: absolute;
      inset: -56px;
      pointer-events: none;
      z-index: 1;

      background:
        radial-gradient(
          circle at 18% 28%,
          rgba(40, 100, 210, 0.16) 0%,
          transparent 30%
        ),
        radial-gradient(
          circle at 82% 38%,
          rgba(180, 35, 88, 0.12) 0%,
          transparent 32%
        ),
        radial-gradient(
          circle at 50% 78%,
          rgba(80, 45, 170, 0.13) 0%,
          transparent 34%
        );

      opacity: 0.8;
      mix-blend-mode: screen;

      transform: translate3d(var(--texture-x), var(--texture-y), 0);
      will-change: transform;
    }

    .cavity-stars {
      position: absolute;
      inset: -56px;
      pointer-events: none;
      z-index: 2;

      background:
        radial-gradient(circle at 6% 9%, rgba(255,255,255,0.8) 0px, rgba(255,255,255,0.8) 0.7px, transparent 1.3px),
        radial-gradient(circle at 10% 28%, rgba(210,230,255,0.75) 0px, rgba(210,230,255,0.75) 1px, transparent 1.7px),
        radial-gradient(circle at 14% 61%, rgba(255,255,255,0.7) 0px, rgba(255,255,255,0.7) 0.8px, transparent 1.4px),
        radial-gradient(circle at 18% 82%, rgba(255,255,255,0.85) 0px, rgba(255,255,255,0.85) 1.2px, transparent 2px),
        radial-gradient(circle at 23% 17%, rgba(255,220,235,0.75) 0px, rgba(255,220,235,0.75) 0.9px, transparent 1.5px),
        radial-gradient(circle at 27% 44%, rgba(255,255,255,0.7) 0px, rgba(255,255,255,0.7) 0.6px, transparent 1.2px),
        radial-gradient(circle at 31% 72%, rgba(190,220,255,0.85) 0px, rgba(190,220,255,0.85) 1.4px, transparent 2.2px),
        radial-gradient(circle at 36% 10%, rgba(255,255,255,0.75) 0px, rgba(255,255,255,0.75) 0.8px, transparent 1.4px),
        radial-gradient(circle at 39% 35%, rgba(255,255,255,0.9) 0px, rgba(255,255,255,0.9) 1.1px, transparent 1.8px),
        radial-gradient(circle at 43% 89%, rgba(210,235,255,0.7) 0px, rgba(210,235,255,0.7) 0.7px, transparent 1.3px),
        radial-gradient(circle at 48% 22%, rgba(255,255,255,0.8) 0px, rgba(255,255,255,0.8) 0.9px, transparent 1.5px),
        radial-gradient(circle at 52% 57%, rgba(255,215,235,0.75) 0px, rgba(255,215,235,0.75) 1.1px, transparent 1.8px),
        radial-gradient(circle at 57% 76%, rgba(255,255,255,0.75) 0px, rgba(255,255,255,0.75) 0.8px, transparent 1.4px),
        radial-gradient(circle at 61% 12%, rgba(190,220,255,0.9) 0px, rgba(190,220,255,0.9) 1.5px, transparent 2.3px),
        radial-gradient(circle at 65% 39%, rgba(255,255,255,0.7) 0px, rgba(255,255,255,0.7) 0.7px, transparent 1.3px),
        radial-gradient(circle at 69% 91%, rgba(255,255,255,0.8) 0px, rgba(255,255,255,0.8) 1px, transparent 1.7px),
        radial-gradient(circle at 73% 24%, rgba(255,220,235,0.8) 0px, rgba(255,220,235,0.8) 0.9px, transparent 1.5px),
        radial-gradient(circle at 77% 66%, rgba(210,235,255,0.85) 0px, rgba(210,235,255,0.85) 1.3px, transparent 2.1px),
        radial-gradient(circle at 82% 8%, rgba(255,255,255,0.75) 0px, rgba(255,255,255,0.75) 0.8px, transparent 1.4px),
        radial-gradient(circle at 86% 47%, rgba(255,255,255,0.9) 0px, rgba(255,255,255,0.9) 1.2px, transparent 1.9px),
        radial-gradient(circle at 91% 79%, rgba(200,230,255,0.75) 0px, rgba(200,230,255,0.75) 0.9px, transparent 1.5px),
        radial-gradient(circle at 96% 31%, rgba(255,255,255,0.7) 0px, rgba(255,255,255,0.7) 0.7px, transparent 1.3px);

      opacity: 0.92;
      mix-blend-mode: screen;

      transform: translate3d(var(--texture-x), var(--texture-y), 0);
      will-change: transform;
    }

    .back-cavity::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 3;

      background:
        radial-gradient(
          ellipse at center,
          rgba(255, 255, 255, 0.025) 0%,
          transparent 48%,
          rgba(0, 0, 0, 0.42) 100%
        ),
        linear-gradient(
          145deg,
          rgba(255, 255, 255, 0.025),
          transparent 45%,
          rgba(0, 0, 0, 0.22)
        );
    }

    .back-text-layer {
      position: absolute;
      inset: 20px 18px;
      z-index: 6;

      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;

      pointer-events: auto;
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }

    .back-logo {
      position: absolute;
      top: 34px;
      left: 0;
      width: 100%;
      text-align: center;

      color: white;
      font-size: clamp(1.35rem, 3.5vw, 2.05rem);
      font-weight: 400;
      letter-spacing: 0.05em;

      text-shadow:
        0 2px 4px rgba(0, 0, 0, 0.65),
        0 0 12px rgba(90, 150, 255, 0.18);
    }

    .contact-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .contact-list a {
      color: white;
      text-decoration: none;
      font-size: clamp(1.2rem, 3.8vw, 1.9rem);
      font-weight: 400;
      letter-spacing: 0.06em;

      text-shadow:
        0 2px 4px rgba(0, 0, 0, 0.65),
        0 0 12px rgba(90, 150, 255, 0.18);
    }

    .contact-list a:hover {
      text-decoration: underline;
    }

    .shine {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      border-radius: 22px;

      background: linear-gradient(
        105deg,
        transparent 35%,
        rgba(255, 219, 112, 0.7) 45%,
        rgba(132, 50, 255, 0.58) 50%,
        rgba(96, 220, 255, 0.5) 55%,
        transparent 65%
      );

      background-size: 200% 200%;
      mix-blend-mode: color-dodge;
      filter: brightness(1.2) saturate(1.4);
      transition: opacity 0.2s ease;
    }

    .cursor-light {
      --x: 50%;
      --y: 50%;

      position: absolute;
      inset: 0;
      z-index: 7;
      pointer-events: none;
      opacity: 0;
      border-radius: 22px;

      background: radial-gradient(
        circle at var(--x) var(--y),
        rgba(255, 255, 255, 0.35) 0%,
        rgba(140, 210, 255, 0.18) 18%,
        transparent 38%
      );

      mix-blend-mode: screen;
      transition: opacity 0.2s ease;
    }
  </style>
</head>

<body>
  <div class="page">
    <div class="container">
      <div class="physical-card">
        <div class="card-face card-front">
          <div class="shine"></div>
          <div class="cursor-light"></div>
        </div>

        <div class="card-face card-back">
          <div class="back-cavity">
            <div class="cavity-space"></div>
            <div class="cavity-stars"></div>
          </div>

          <div class="back-text-layer">
            <div class="back-logo">Join PokéPharm!</div>

            <div class="contact-list">
              <a href="#">Instagram</a>
              <a href="#">Contact</a>
            </div>
          </div>

          <div class="cursor-light"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const container = document.querySelector(".container");
    const physicalCard = document.querySelector(".physical-card");
    const shine = document.querySelector(".shine");
    const cursorLights = document.querySelectorAll(".cursor-light");
    const backCavity = document.querySelector(".back-cavity");

    let isHovering = false;

    container.addEventListener("pointermove", function (e) {
      isHovering = true;

      const rect = container.getBoundingClientRect();

      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const percentX = x / rect.width;
      const percentY = y / rect.height;

      const shineX = Math.max(0, Math.min(1, percentX));
      const shineY = Math.max(0, Math.min(1, percentY));

      const rotateY = 15 - percentX * 30;
      const rotateX = percentY * 30 - 15;

      physicalCard.style.setProperty("--tilt-x", `${rotateX}deg`);
      physicalCard.style.setProperty("--tilt-y", `${rotateY}deg`);
      physicalCard.style.setProperty("--scale", "1.03");

      const textureX = (-rotateY * 0.7).toFixed(2);
      const textureY = (rotateX * 0.7).toFixed(2);

      backCavity.style.setProperty("--texture-x", `${textureX}px`);
      backCavity.style.setProperty("--texture-y", `${textureY}px`);

      cursorLights.forEach((light) => {
        light.style.setProperty("--x", `${percentX * 100}%`);
        light.style.setProperty("--y", `${percentY * 100}%`);
        light.style.opacity = "0.55";
      });

      if (!container.classList.contains("is-flipped")) {
        shine.style.opacity = "0.85";
        shine.style.backgroundPosition = `${shineX * 100}% ${shineY * 100}%`;
      } else {
        shine.style.opacity = "0";
      }
    });

    container.addEventListener("pointerleave", function () {
      isHovering = false;

      physicalCard.style.setProperty("--tilt-x", "0deg");
      physicalCard.style.setProperty("--tilt-y", "0deg");
      physicalCard.style.setProperty("--scale", "1");

      backCavity.style.setProperty("--texture-x", "0px");
      backCavity.style.setProperty("--texture-y", "0px");

      shine.style.opacity = "0";

      cursorLights.forEach((light) => {
        light.style.opacity = "0";
      });
    });

    container.addEventListener("click", function (e) {
      if (e.target.closest("a")) return;

      container.classList.add("is-animating");
      container.classList.toggle("is-flipped");

      shine.style.opacity = "0";

      cursorLights.forEach((light) => {
        light.style.opacity = "0";
      });

      setTimeout(() => {
        container.classList.remove("is-animating");
      }, 750);
    });

    document.addEventListener(
      "touchmove",
      function (e) {
        e.preventDefault();
      },
      { passive: false }
    );
  </script>
</body>
</html>
