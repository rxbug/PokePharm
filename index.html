<div class="container">
  <div class="overlay"></div>
  <div class="card"></div>
</div>

<script>
  var container = document.querySelector('.container')
  var overlay = document.querySelector('.overlay')
  contriner.addEventListener('mousemove', function(e){
    var x = e.offsetX
    var y = e.offsetY
    var rotateY = -40/1065 * x + 20
    var rotateX = -40/1477 * y + 20

    overlay.style = 'background-position : ${x/5 + y/5}%'
    
    container.style = 'transform : perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)'
  })

  container.addEventListener('mouseout', function(){
    overlay.style = 'filter : opacity(0)'
    container.style = 'transform : perspective(1000px) rotateY(0deg) rotateX(0deg)'
  })
  
</script>

<style>
  .container {
    width: 1065px; height: 1477px; transition : all 0.1s;
    position: relative
  }
  .overlay{
    position: absolute;
    width: 1065px;
    height: 1477px;
    background: linear-gradient(105deg,
                                transparent 40%,
                                rgba(255, 219, 112, 0.8) 45%,
                                rgba(132, 50, 255, 0.6) 50%,
                                transparent 54%);
    filter: brightness(1.1) opacity(0.8);
    mix-blend-mode: color-dodge;
    background-size: 150% 150%;
    background-position: 100%;
    transition: all 0.1s
  }
  .card {
    width: 1065px; height: 1477px;
    background-image: url(PokePharm.webp);
    background-size: cover;
  }
</style>
