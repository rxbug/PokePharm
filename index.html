<div class="page">
  <h1 class="site-title">PokéPharm</h1>

  <div class="container">
    <div class="card-inner">
      <div class="card-face card-front"></div>

      <div class="card-face card-back">
        <div class="contact-list">
          <a href="#">Instagram</a>
          <a href="#">Contact</a>
        </div>
      </div>
    </div>

    <div class="shine"></div>
    <div class="cursor-light"></div>
  </div>
</div>

<script>
  const container = document.querySelector(".container");
  const shine = document.querySelector(".shine");
  const cursorLight = document.querySelector(".cursor-light");

  container.addEventListener("mousemove", function (e) {
    const rect = container.getBoundingClientRect();

    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const percentX = x / rect.width;
    const percentY = y / rect.height;

    cursorLight.style.setProperty("--x", `${percentX * 100}%`);
    cursorLight.style.setProperty("--y", `${percentY * 100}%`);

    const rotateY = 15 - percentX * 30;
    const rotateX = percentY * 30 - 15;

    shine.style.opacity = "0.85";
    cursorLight.style.opacity = "0.55";

    shine.style.backgroundPosition = `${percentX * 100}% ${percentY * 100}%`;

    container.style.transform = `
      perspective(1000px)
      rotateX(${rotateX}deg)
      rotateY(${rotateY}deg)
      scale(1.03)
    `;
  });

  container.addEventListener("mouseleave", function () {
    shine.style.opacity = "0";
    cursorLight.style.opacity = "0";

    cursorLight.style.setProperty("--x", "50%");
    cursorLight.style.setProperty("--y", "50%");

    container.style.transform = `
      perspective(1000px)
      rotateX(0deg)
      rotateY(0deg)
      scale(1)
    `;
  });

  container.addEventListener("click", function (e) {
    if (e.target.closest("a")) return;
    container.classList.toggle("is-flipped");
  });
</script>
